<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Sayfa — Ödeme Takip</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="grid-bg"></div>
<nav class="navbar">
  <div class="nav-brand">
    <span class="mono accent">ETS</span>
    <button class="nav-icon-btn nav-home-icon active" style="color:var(--accent);cursor:default;" title="Anasayfa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
    <span class="nav-brand-sep">›</span>
    <span>Ödeme Takip Sistemi</span>
  </div>
  <div class="nav-right">
    <button class="nav-icon-btn admin" id="adminBtn" onclick="window.location.href='/admin'" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </button>
    <button class="nav-icon-btn" id="themeToggle" type="button" data-tip="Temayı Değiştir">
      <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="nav-icon-btn logout" onclick="logout()" data-tip="Çıkış Yap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</nav>

<div class="container">
  <!-- Özet Kartlar -->
  <div class="summary-grid" id="summaryGrid">

    <!-- Birleşik: TL Toplam | USD Toplam | Genel Toplam -->
    <div class="summary-card combined-card">
      <div class="combined-inner">
        <div class="combined-col">
          <div class="summary-label">TL Toplam</div>
          <div class="summary-value" id="sumGenel">—</div>
        </div>
        <div class="combined-divider"></div>
        <div class="combined-col combined-col-usd">
          <div class="summary-label">USD Toplam</div>
          <div class="summary-value" id="sumUsdGenel">—</div>
          <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;">
            <span style="font-size:11px;color:var(--text-muted);white-space:nowrap;">USD Tahsil Edilen</span>
            <span style="font-size:13px;font-weight:600;color:#22c55e;" id="sumUsdTahsil">—</span>
          </div>
        </div>
        <div class="combined-divider"></div>
        <div class="combined-col combined-col-genel">
          <div class="summary-label">Genel Toplam</div>
          <div class="summary-value" id="sumKombine">—</div>
          <div style="margin-top:6px;min-height:16px;font-size:11px;color:var(--text-muted);" id="sumKombineUsd"></div>
        </div>
      </div>
    </div>

    <!-- Kesilen Fatura Tutarı -->
    <div class="summary-card accent-card">
      <div class="summary-label">Kesilen Fatura Tutarı</div>
      <div class="summary-value" id="sumFatura">—</div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;">
        <span style="font-size:11px;color:var(--text-muted);white-space:nowrap;">Tahsil Edilen</span>
        <span style="font-size:13px;font-weight:600;color:var(--success);" id="sumTahsil">—</span>
      </div>
    </div>

    <!-- TL Bekleyen -->
    <div class="summary-card warn-card">
      <div class="summary-label">TL Bekleyen</div>
      <div class="summary-value" id="sumBekleyen">—</div>
    </div>

  </div>

  <!-- Split Panel -->
  <div class="split-panel">

    <!-- Sol: Firma Listesi -->
    <div class="split-left">
      <div class="section-header">
        <h2>Firmalar</h2>
        <button class="btn-primary" onclick="openFirmaModal()">+ Firma Ekle</button>
      </div>
      <input type="text" class="search-input" id="aramaInput" placeholder="Firma ara..." oninput="filterFirmalar()" />
      <div id="firmaListesi"></div>
    </div>

    <!-- Sağ: Önizleme -->
    <div class="split-right" id="onizlemePanel">
      <div class="onizleme-bos" id="onizlemeBos">
        <div class="onizleme-bos-ikon">⬅</div>
        <div>Önizlemek için bir firma seçin</div>
      </div>

      <div class="onizleme-icerik" id="onizlemeIcerik" style="display:none;" ondblclick="if(seciliFirmaId) window.location.href='/firma/'+seciliFirmaId">
        <div class="onizleme-header">
          <div style="display:flex;align-items:center;gap:10px;">
            <div id="onizlemeLogo"></div>
            <div>
              <div class="onizleme-ad" id="onizlemeAd"></div>
              <div class="onizleme-not" id="onizlemeNot"></div>
            </div>
          </div>
          <div class="onizleme-header-sag">
            <div id="onizlemeToplam" style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;"></div>
            <a class="btn-primary" id="onizlemeLink" href="#">Detaya Git →</a>
          </div>
        </div>
        <div class="onizleme-hizmetler" id="onizlemeHizmetler"></div>
      </div>
    </div>

  </div>
</div>

<div id="aciklamaTooltip"></div>

<!-- Firma Modal -->
<div class="modal-overlay" id="firmaModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="firmaModalBaslik">Firma Ekle</h3>
      <button class="modal-close" onclick="closeFirmaModal()">✕</button>
    </div>
    <label>Firma Adı *</label>
    <input type="text" id="firmaAd" class="modal-input" />
    <label>Web Sitesi (opsiyonel)</label>
    <input type="text" id="firmaWebsite" class="modal-input" placeholder="https://örnek.com" />
    <label>Not (opsiyonel)</label>
    <textarea id="firmaNot" class="modal-input modal-textarea"></textarea>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeFirmaModal()">İptal</button>
      <button class="btn-primary" onclick="saveFirma()">Kaydet</button>
    </div>
    <div class="modal-error" id="firmaError"></div>
  </div>
</div>

<!-- Silme Onay Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Firmayı Sil</h3>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:24px;">Bu firmaya ait tüm hizmet kayıtları da silinecek. Emin misiniz?</p>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeDeleteModal()">İptal</button>
      <button class="btn-danger" onclick="confirmDelete()">Sil</button>
    </div>
  </div>
</div>

<script>
  let tumFirmalar = [];
  let firmaMap = {};
  let editFirmaId = null;
  let deleteFirmaId = null;
  let seciliFirmaId = null;
  let kurUSD = null;

  async function fetchKur() {
    try {
      let saved = null;
      try { saved = parseFloat(localStorage.getItem('kurUSD')); } catch {}
      if (saved && saved > 1) { kurUSD = saved; }
      const res = await fetch('https://open.er-api.com/v6/latest/USD');
      const data = await res.json();
      if (data && data.rates && data.rates.TRY) {
        kurUSD = data.rates.TRY;
        try { localStorage.setItem('kurUSD', kurUSD); } catch {}
      }
    } catch {
      try {
        const saved = parseFloat(localStorage.getItem('kurUSD'));
        if (saved && saved > 1) kurUSD = saved;
      } catch {}
    }
  }

  const tipLabels = {
    'danismanlik': 'Danışmanlık',
    'urun-tedariki': 'Ürün Tedariği',
    'cihaz-kurulumu': 'Cihaz Kurulumu',
    'devreye-alma': 'Devreye Alma',
    'diger': 'Diğer'
  };
  const durumLabels = { 'bekliyor': 'Bekliyor', 'tamamlandi': 'Tamamlandı', 'tahsil-edildi': 'Tahsil Edildi' };
  const durumClass  = { 'bekliyor': 'badge-warn', 'tamamlandi': 'badge-info', 'tahsil-edildi': 'badge-success' };

  function applyTheme(next) {
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('theme', next); } catch {}
    const sun  = document.getElementById('iconSun');
    const moon = document.getElementById('iconMoon');
    if (sun && moon) {
      sun.style.display  = next === 'light' ? 'block' : 'none';
      moon.style.display = next === 'dark'  ? 'block' : 'none';
    }
  }

  function initTheme() {
    let t = null;
    try { t = localStorage.getItem('theme'); } catch {}
    if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    applyTheme(t);
    document.getElementById('themeToggle').addEventListener('click', () => {
      applyTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');
    });
  }

  async function checkAuth() {
    const res = await fetch('/api/auth/me');
    const data = await res.json();
    if (!data.loggedIn) { window.location.href = '/login'; return; }
    if (data.isAdmin) document.getElementById('adminBtn').style.display = 'flex';
  }

  async function loadOzet() {
    const res = await fetch('/api/hizmetler/ozet');
    if (!res.ok) return;
    const d = await res.json();
    document.getElementById('sumGenel').innerHTML    = formatPara(d.tryToplam);
    document.getElementById('sumFatura').innerHTML   = formatPara(d.tryFatura);
    document.getElementById('sumTahsil').innerHTML   = formatPara(d.tryTahsil);
    document.getElementById('sumBekleyen').innerHTML = formatPara(d.tryBekleyen);

    const usdFmt = v => {
      const s = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v);
      let tl = kurUSD ? ` <span style="opacity:0.55;font-size:12px;">(₺${new Intl.NumberFormat('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:0}).format(v*kurUSD)})</span>` : '';
      return `<span class="currency" style="font-family:inherit;">$</span>${s}${tl}`;
    };
    document.getElementById('sumUsdGenel').innerHTML  = d.usdToplam ? usdFmt(d.usdToplam) : '—';
    document.getElementById('sumUsdTahsil').innerHTML = d.usdTahsil ? usdFmt(d.usdTahsil) : '—';

    if (kurUSD && d.usdToplam) {
      const kombine = d.tryToplam + d.usdToplam * kurUSD;
      const kombineUSD = d.usdToplam + d.tryToplam / kurUSD;
      const kombineUSDFmt = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(kombineUSD);
      document.getElementById('sumKombine').innerHTML    = formatPara(kombine);
      document.getElementById('sumKombineUsd').innerHTML = `<span class="currency" style="font-family:inherit;">$</span>${kombineUSDFmt} USD karşılığı`;
    } else {
      document.getElementById('sumKombine').innerHTML    = formatPara(d.tryToplam);
      document.getElementById('sumKombineUsd').innerHTML = '';
    }
  }

  async function loadFirmalar() {
    const res = await fetch('/api/firmalar/finansal');
    if (!res.ok) { if (res.status === 401) window.location.href = '/login'; return; }
    tumFirmalar = await res.json();
    firmaMap = {};
    tumFirmalar.forEach(f => firmaMap[f._id] = f);
    renderFirmalar(tumFirmalar);
  }

  // Kolon başlığı ikonları
  const icoWallet   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>`;
  const icoReceipt  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z"/><path d="M16 8H8M16 12H8M12 16H8"/></svg>`;
  const icoBanknote = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>`;
  const icoBalance  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`;

  function renderFirmalar(firmalar) {
    const el = document.getElementById('firmaListesi');
    if (!firmalar.length) {
      el.innerHTML = '<div class="empty-state">Henüz firma eklenmedi.</div>';
      return;
    }

    el.innerHTML = `<div class="firma-liste">
      <div class="firma-liste-baslik">
        <span style="text-align:left;padding-left:2px;">Firma Adı</span>
        <span class="col-header-fin">${icoWallet}<span>Toplam Tutar</span></span>
        <span class="col-header-fin">${icoReceipt}<span>Kesilen Fatura</span></span>
        <span class="col-header-fin">${icoBanknote}<span>Alınan Ödeme</span></span>
        <span class="col-header-fin">${icoBalance}<span>Kalan Bakiye</span></span>
        <span>İşlemler</span>
      </div>
      ${firmalar.map(f => {
        const fin   = f.fin || { toplam: 0, fatura: 0, odeme: 0, usdVarMi: false };
        const kalan = Math.max(0, fin.fatura - fin.odeme);
        const kalanHtml = kalan === 0 && fin.fatura > 0
          ? `<span class="badge badge-glowing" style="font-size:10px;padding:2px 8px;width:auto;">Tamamlandı ✓</span>`
          : kalan > 0
            ? `<span class="firma-kalan-warn">${formatPara(kalan)}</span>`
            : `<span style="opacity:0.28">—</span>`;
        return `
        <div class="firma-liste-row ${seciliFirmaId === f._id ? 'aktif' : ''}" data-id="${f._id}" style="cursor:pointer;">
          <div style="display:flex;align-items:center;gap:11px;min-width:0;">
            ${firmaLogo(f)}
            <div style="min-width:0;">
              <div class="firma-liste-ad">${escHtml(f.ad)}</div>
              ${fin.usdVarMi ? `<div style="font-size:10px;color:#22c55e;opacity:0.8;margin-top:1px;">+USD</div>` : ''}
            </div>
          </div>
          <div class="firma-fin-val firma-col-toplam">${fin.toplam > 0 ? formatPara(fin.toplam) : '<span style="opacity:0.28">—</span>'}</div>
          <div class="firma-fin-val firma-col-fatura${fin.fatura === 0 ? ' fin-pending' : ''}">${fin.fatura > 0 ? formatPara(fin.fatura) : '<span style="opacity:0.28">—</span>'}</div>
          <div class="firma-fin-val fin-success firma-col-odeme">${fin.odeme > 0 ? formatPara(fin.odeme) : '<span style="opacity:0.28">—</span>'}</div>
          <div class="firma-fin-val firma-col-kalan">${kalanHtml}</div>
          <div class="firma-liste-actions">
            <button class="btn-icon edit-btn" data-id="${f._id}">✎</button>
            <button class="btn-icon danger delete-btn" data-id="${f._id}">✕</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;

    el.querySelectorAll('.firma-liste-row').forEach(row => {
      row.addEventListener('click', () => {
        if (window.innerWidth < 768) {
          window.location.href = '/firma/' + row.dataset.id;
        } else {
          selectFirma(row.dataset.id);
        }
      });
      row.addEventListener('dblclick', () => window.location.href = '/firma/' + row.dataset.id);
    });
    el.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const f = firmaMap[btn.dataset.id];
        if (f) openEditFirma(f._id, f.ad, f.website || '', f.not || '');
      });
    });
    el.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        openDeleteModal(btn.dataset.id);
      });
    });
  }

  async function selectFirma(id) {
    const panelZatenAcik = seciliFirmaId !== null;
    seciliFirmaId = id;
    renderFirmalar(tumFirmalar.filter(f => {
      const q = document.getElementById('aramaInput').value.toLowerCase();
      return f.ad.toLowerCase().includes(q);
    }));

    const icerik = document.getElementById('onizlemeIcerik');

    if (panelZatenAcik) {
      icerik.classList.add('gecis');
      await new Promise(r => setTimeout(r, 180));
    }

    const res = await fetch(`/api/firmalar/${id}/detay`);
    if (!res.ok) return;
    const d = await res.json();

    document.getElementById('onizlemeBos').style.display = 'none';
    icerik.style.display = 'flex';
    document.querySelector('.split-panel').classList.add('onizleme-acik');
    const ipucu = document.getElementById('firmaIpucu');
    if (ipucu) ipucu.style.display = 'none';

    document.getElementById('onizlemeLogo').innerHTML  = firmaLogo(d.firma);
    document.getElementById('onizlemeAd').textContent  = d.firma.ad;
    document.getElementById('onizlemeNot').textContent = d.firma.not || '';
    document.getElementById('onizlemeLink').href = `/firma/${id}`;

    let tryT = 0, usdT = 0;
    d.hizmetler.forEach(h => {
      if (!h.fiyat) return;
      if ((h.paraBirimi || 'TRY') === 'USD') usdT += h.fiyat;
      else tryT += h.fiyat;
    });
    const toplamEl = document.getElementById('onizlemeToplam');
    const usdFmtStr = v => new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v);
    if (usdT > 0) {
      const kombineHtml = kurUSD
        ? `<div class="onizleme-para-kombine">${formatPara(tryT + usdT * kurUSD)}</div>`
        : '';
      toplamEl.innerHTML = `
        <div class="onizleme-para-grup">
          <span class="onizleme-para-satir">${formatPara(tryT)}</span>
          <span class="onizleme-para-satir usd"><span style="font-family:inherit;">$</span>${usdFmtStr(usdT)} USD</span>
          ${kombineHtml}
        </div>`;
    } else {
      toplamEl.innerHTML = `<div class="onizleme-toplam">${formatPara(tryT)}</div>`;
    }

    const hEl = document.getElementById('onizlemeHizmetler');
    if (!d.hizmetler.length) {
      hEl.innerHTML = '<div class="empty-state" style="padding:24px 0;">Henüz hizmet kaydı yok.</div>';
    } else {
      hEl.innerHTML = `<div class="hizmet-liste" style="margin-top:0;">
        <div class="hizmet-liste-baslik" style="grid-template-columns:130px 100px 1fr 90px;">
          <span>Tip</span><span>Durum</span><span>Açıklama</span><span>Fiyat</span>
        </div>
        ${d.hizmetler.map(h => `
        <div class="hizmet-row" style="grid-template-columns:130px 100px 1fr 90px;">
          <span class="tip-badge">${escHtml(tipLabels[h.tip] || h.tip)}</span>
          <span class="badge ${durumClass[h.durum]}">${durumLabels[h.durum] || h.durum}</span>
          <div class="hizmet-aciklama" onmouseenter="showTooltip(event,this)" onmouseleave="hideTooltip()">${escHtml(h.aciklama)}</div>
          <span class="hizmet-fiyat">${formatFiyat(h.fiyat, h.paraBirimi)}</span>
        </div>`).join('')}
      </div>`;
    }

    icerik.classList.remove('gecis');
  }

  function filterFirmalar() {
    const q = document.getElementById('aramaInput').value.toLowerCase();
    renderFirmalar(tumFirmalar.filter(f => f.ad.toLowerCase().includes(q)));
  }

  function openFirmaModal() {
    editFirmaId = null;
    document.getElementById('firmaModalBaslik').textContent = 'Firma Ekle';
    document.getElementById('firmaAd').value = '';
    document.getElementById('firmaWebsite').value = '';
    document.getElementById('firmaNot').value = '';
    document.getElementById('firmaError').textContent = '';
    document.getElementById('firmaModal').classList.add('open');
  }

  function openEditFirma(id, ad, website, not) {
    editFirmaId = id;
    document.getElementById('firmaModalBaslik').textContent = 'Firma Düzenle';
    document.getElementById('firmaAd').value = ad;
    document.getElementById('firmaWebsite').value = website || localStorage.getItem('fw_' + id) || '';
    document.getElementById('firmaNot').value = not;
    document.getElementById('firmaError').textContent = '';
    document.getElementById('firmaModal').classList.add('open');
  }

  function closeFirmaModal() { document.getElementById('firmaModal').classList.remove('open'); }

  async function saveFirma() {
    const ad      = document.getElementById('firmaAd').value.trim();
    const website = document.getElementById('firmaWebsite').value.trim();
    const not     = document.getElementById('firmaNot').value.trim();
    const errEl   = document.getElementById('firmaError');
    if (!ad) { errEl.textContent = 'Firma adı gerekli.'; return; }
    errEl.textContent = '';
    const url    = editFirmaId ? `/api/firmalar/${editFirmaId}` : '/api/firmalar';
    const method = editFirmaId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ad, website, not }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Hata oluştu.'; return; }
    // Website'yi localStorage'a da kaydet (DB bağımsız logo için)
    const firmaId = editFirmaId || data._id;
    if (firmaId) {
      if (website) localStorage.setItem('fw_' + firmaId, website);
      else localStorage.removeItem('fw_' + firmaId);
    }
    closeFirmaModal();
    loadFirmalar();
    loadOzet();
  }

  function openDeleteModal(id) {
    deleteFirmaId = id;
    document.getElementById('deleteModal').classList.add('open');
  }

  function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('open');
    deleteFirmaId = null;
  }

  async function confirmDelete() {
    if (!deleteFirmaId) return;
    const res = await fetch(`/api/firmalar/${deleteFirmaId}`, { method: 'DELETE' });
    if (res.ok) {
      if (seciliFirmaId === deleteFirmaId) {
        seciliFirmaId = null;
        document.getElementById('onizlemeBos').style.display = 'flex';
        document.getElementById('onizlemeIcerik').style.display = 'none';
      }
      closeDeleteModal();
      loadFirmalar();
      loadOzet();
    }
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  }

  function formatPara(val) {
    if (val === null || val === undefined) return '—';
    const formatted = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val);
    return `<span class="currency">₺</span>${formatted}`;
  }

  function formatFiyat(fiyat, paraBirimi) {
    if (fiyat === null || fiyat === undefined) return '<span style="opacity:0.3">—</span>';
    if ((paraBirimi || 'TRY') === 'USD') {
      const usdFmt = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(fiyat);
      let tlKarsilik = '';
      if (kurUSD) {
        const tl = fiyat * kurUSD;
        const tlFmt = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(tl);
        tlKarsilik = ` <span style="opacity:0.55;font-size:11px;">(₺${tlFmt})</span>`;
      }
      return `<span class="currency" style="font-family:inherit;">$</span>${usdFmt}${tlKarsilik}`;
    }
    return formatPara(fiyat);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/\r/g,'').replace(/\n/g,' ');
  }

  const avatarRenkler = ['#4f8ef5','#22c55e','#f59e0b','#a78bfa','#f07070','#06b6d4','#ec4899','#84cc16'];
  function avatarRenk(ad) {
    let hash = 0;
    for (let i = 0; i < ad.length; i++) hash = ad.charCodeAt(i) + ((hash << 5) - hash);
    return avatarRenkler[Math.abs(hash) % avatarRenkler.length];
  }

  function firmaWebsite(f) {
    return f.website || localStorage.getItem('fw_' + f._id) || '';
  }

  function firmaLogo(f) {
    const harf = (f.ad || '?')[0].toUpperCase();
    const renk = avatarRenk(f.ad || '');
    const site = firmaWebsite(f);
    if (site) {
      const domain = site.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
      return `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64" class="firma-logo-img"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
        <div class="firma-logo-avatar" style="background:${renk};display:none;">${harf}</div>`;
    }
    return `<div class="firma-logo-avatar" style="background:${renk};">${harf}</div>`;
  }

  const tooltip = document.getElementById('aciklamaTooltip');
  function showTooltip(e, el) {
    if (el.scrollWidth <= el.clientWidth) return;
    tooltip.textContent = el.textContent;
    tooltip.style.display = 'block';
    posTooltip(e);
    el._moveHandler = posTooltip;
    el.addEventListener('mousemove', posTooltip);
  }
  function posTooltip(e) {
    const margin = 12;
    let x = e.clientX + 14;
    let y = e.clientY + 14;
    if (x + 360 > window.innerWidth) x = e.clientX - 360 - margin;
    if (y + 120 > window.innerHeight) y = e.clientY - 120 - margin;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  }
  function hideTooltip() {
    tooltip.style.display = 'none';
    document.querySelectorAll('.hizmet-aciklama').forEach(el => {
      if (el._moveHandler) { el.removeEventListener('mousemove', el._moveHandler); delete el._moveHandler; }
    });
  }

  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });

  initTheme();
  checkAuth().then(() => { fetchKur().then(() => { loadOzet(); loadFirmalar(); }); });
</script>
</body>
</html>
