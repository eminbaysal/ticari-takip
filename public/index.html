<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Sayfa — Ödeme Takip</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="grid-bg"></div>
<nav class="navbar">
  <div class="nav-brand">
    <span class="mono accent">ETS</span>
    <span>Ödeme Takip Sistemi</span>
  </div>
  <div class="nav-right">
    <button class="nav-icon-btn admin" id="adminBtn" onclick="window.location.href='/admin'" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </button>
    <button class="nav-icon-btn" id="themeToggle" type="button" data-tip="Temayı Değiştir">
      <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="nav-icon-btn logout" onclick="logout()" data-tip="Çıkış Yap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</nav>

<div class="container">
  <!-- Özet Kartlar -->
  <div class="summary-grid" id="summaryGrid">
    <div class="summary-card">
      <div class="summary-label">TL Toplam</div>
      <div class="summary-value" id="sumGenel">—</div>
    </div>
    <div class="summary-card accent-card">
      <div class="summary-label">TL Tahsil Edilen</div>
      <div class="summary-value" id="sumTahsil">—</div>
    </div>
    <div class="summary-card warn-card">
      <div class="summary-label">TL Bekleyen</div>
      <div class="summary-value" id="sumBekleyen">—</div>
    </div>
    <div class="summary-card usd-card">
      <div class="summary-label">USD Toplam</div>
      <div class="summary-value" id="sumUsdGenel">—</div>
    </div>
    <div class="summary-card usd-tahsil-card">
      <div class="summary-label">USD Tahsil Edilen</div>
      <div class="summary-value" id="sumUsdTahsil">—</div>
    </div>
    <div class="summary-card kombine-card">
      <div class="summary-label">Kombine Toplam (TL)</div>
      <div class="summary-value" id="sumKombine">—</div>
    </div>
  </div>

  <!-- Split Panel -->
  <div class="split-panel">

    <!-- Sol: Firma Listesi -->
    <div class="split-left">
      <div class="section-header">
        <h2>Firmalar</h2>
        <button class="btn-primary" onclick="openFirmaModal()">+ Firma Ekle</button>
      </div>
      <input type="text" class="search-input" id="aramaInput" placeholder="Firma ara..." oninput="filterFirmalar()" />
      <div id="firmaListesi"></div>
    </div>

    <!-- Sağ: Önizleme -->
    <div class="split-right" id="onizlemePanel">
      <div class="onizleme-bos" id="onizlemeBos">
        <div class="onizleme-bos-ikon">⬅</div>
        <div>Önizlemek için bir firma seçin</div>
      </div>
      <div class="onizleme-icerik" id="onizlemeIcerik" style="display:none;">
        <div class="onizleme-header">
          <div>
            <div class="onizleme-ad" id="onizlemeAd"></div>
            <div class="onizleme-not" id="onizlemeNot"></div>
          </div>
          <div class="onizleme-header-sag">
            <div class="onizleme-toplam" id="onizlemeToplam"></div>
            <a class="btn-primary" id="onizlemeLink" href="#">Detaya Git →</a>
          </div>
        </div>
        <div class="onizleme-hizmetler" id="onizlemeHizmetler"></div>
      </div>
    </div>

  </div>
</div>

<!-- Firma Modal -->
<div class="modal-overlay" id="firmaModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="firmaModalBaslik">Firma Ekle</h3>
      <button class="modal-close" onclick="closeFirmaModal()">✕</button>
    </div>
    <label>Firma Adı *</label>
    <input type="text" id="firmaAd" class="modal-input" />
    <label>Not (opsiyonel)</label>
    <textarea id="firmaNot" class="modal-input modal-textarea"></textarea>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeFirmaModal()">İptal</button>
      <button class="btn-primary" onclick="saveFirma()">Kaydet</button>
    </div>
    <div class="modal-error" id="firmaError"></div>
  </div>
</div>

<!-- Silme Onay Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Firmayı Sil</h3>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:24px;">Bu firmaya ait tüm hizmet kayıtları da silinecek. Emin misiniz?</p>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeDeleteModal()">İptal</button>
      <button class="btn-danger" onclick="confirmDelete()">Sil</button>
    </div>
  </div>
</div>

<script>
  let tumFirmalar = [];
  let editFirmaId = null;
  let deleteFirmaId = null;
  let seciliFirmaId = null;
  let kurUSD = null;

  async function fetchKur() {
    try {
      const res = await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY');
      const data = await res.json();
      kurUSD = data.rates.TRY;
    } catch { kurUSD = null; }
  }

  const tipLabels = {
    'danismanlik': 'Danışmanlık',
    'urun-tedariki': 'Ürün Tedariği',
    'cihaz-kurulumu': 'Cihaz Kurulumu',
    'devreye-alma': 'Devreye Alma',
    'diger': 'Diğer'
  };
  const durumLabels = { 'bekliyor': 'Bekliyor', 'tamamlandi': 'Tamamlandı', 'tahsil-edildi': 'Tahsil Edildi' };
  const durumClass  = { 'bekliyor': 'badge-warn', 'tamamlandi': 'badge-info', 'tahsil-edildi': 'badge-success' };

  function applyTheme(next) {
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('theme', next); } catch {}
    const sun  = document.getElementById('iconSun');
    const moon = document.getElementById('iconMoon');
    if (sun && moon) {
      sun.style.display  = next === 'light' ? 'block' : 'none';
      moon.style.display = next === 'dark'  ? 'block' : 'none';
    }
  }

  function initTheme() {
    let t = null;
    try { t = localStorage.getItem('theme'); } catch {}
    if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    applyTheme(t);
    document.getElementById('themeToggle').addEventListener('click', () => {
      applyTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');
    });
  }

  async function checkAuth() {
    const res = await fetch('/api/auth/me');
    const data = await res.json();
    if (!data.loggedIn) { window.location.href = '/login'; return; }
    if (data.isAdmin) document.getElementById('adminBtn').style.display = 'flex';
  }

  async function loadOzet() {
    const res = await fetch('/api/hizmetler/ozet');
    if (!res.ok) return;
    const d = await res.json();
    document.getElementById('sumGenel').innerHTML    = formatPara(d.tryToplam);
    document.getElementById('sumTahsil').innerHTML   = formatPara(d.tryTahsil);
    document.getElementById('sumBekleyen').innerHTML = formatPara(d.tryBekleyen);

    const usdFmt = v => {
      const s = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v);
      let tl = kurUSD ? ` <span style="opacity:0.55;font-size:12px;">(₺${new Intl.NumberFormat('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:0}).format(v*kurUSD)})</span>` : '';
      return `<span class="currency" style="font-family:inherit;">$</span>${s}${tl}`;
    };
    document.getElementById('sumUsdGenel').innerHTML  = d.usdToplam  ? usdFmt(d.usdToplam)  : '—';
    document.getElementById('sumUsdTahsil').innerHTML = d.usdTahsil  ? usdFmt(d.usdTahsil)  : '—';

    if (kurUSD && d.usdToplam) {
      const kombine = d.tryToplam + d.usdToplam * kurUSD;
      document.getElementById('sumKombine').innerHTML = formatPara(kombine);
    } else {
      document.getElementById('sumKombine').innerHTML = formatPara(d.tryToplam);
    }
  }

  async function loadFirmalar() {
    const res = await fetch('/api/firmalar');
    if (!res.ok) { if (res.status === 401) window.location.href = '/login'; return; }
    tumFirmalar = await res.json();
    renderFirmalar(tumFirmalar);
  }

  function renderFirmalar(firmalar) {
    const el = document.getElementById('firmaListesi');
    if (!firmalar.length) {
      el.innerHTML = '<div class="empty-state">Henüz firma eklenmedi.</div>';
      return;
    }
    el.innerHTML = `<div class="firma-liste">
      <div class="firma-liste-baslik">
        <span>Firma Adı</span>
        <span>İşlemler</span>
      </div>
      ${firmalar.map(f => `
      <div class="firma-liste-row ${seciliFirmaId === f._id ? 'aktif' : ''}" onclick="selectFirma('${f._id}')">
        <div class="firma-liste-ad">${escHtml(f.ad)}</div>
        <div class="firma-liste-actions">
          <button class="btn-icon" onclick="event.stopPropagation();openEditFirma('${f._id}','${escAttr(f.ad)}','${escAttr(f.not||'')}')">✎</button>
          <button class="btn-icon danger" onclick="event.stopPropagation();openDeleteModal('${f._id}')">✕</button>
        </div>
      </div>
      `).join('')}
    </div>`;
  }

  async function selectFirma(id) {
    seciliFirmaId = id;
    renderFirmalar(tumFirmalar.filter(f => {
      const q = document.getElementById('aramaInput').value.toLowerCase();
      return f.ad.toLowerCase().includes(q);
    }));

    const res = await fetch(`/api/firmalar/${id}/detay`);
    if (!res.ok) return;
    const d = await res.json();

    document.getElementById('onizlemeBos').style.display = 'none';
    document.getElementById('onizlemeIcerik').style.display = 'flex';
    document.getElementById('onizlemeAd').textContent  = d.firma.ad;
    document.getElementById('onizlemeNot').textContent = d.firma.not || '';
    document.getElementById('onizlemeLink').href = `/firma/${id}`;

    const toplam = d.hizmetler.reduce((s, h) => s + (h.fiyat || 0), 0);
    document.getElementById('onizlemeToplam').innerHTML = formatPara(toplam);

    const hEl = document.getElementById('onizlemeHizmetler');
    if (!d.hizmetler.length) {
      hEl.innerHTML = '<div class="empty-state" style="padding:24px 0;">Henüz hizmet kaydı yok.</div>';
      return;
    }
    hEl.innerHTML = `<div class="hizmet-liste" style="margin-top:0;">
      <div class="hizmet-liste-baslik" style="grid-template-columns:130px 100px 1fr 90px;">
        <span>Tip</span><span>Durum</span><span>Açıklama</span><span>Fiyat</span>
      </div>
      ${d.hizmetler.map(h => `
      <div class="hizmet-row" style="grid-template-columns:130px 100px 1fr 90px;">
        <span class="tip-badge">${escHtml(tipLabels[h.tip] || h.tip)}</span>
        <span class="badge ${durumClass[h.durum]}">${durumLabels[h.durum] || h.durum}</span>
        <div class="hizmet-aciklama">${escHtml(h.aciklama)}</div>
        <span class="hizmet-fiyat">${h.fiyat !== null && h.fiyat !== undefined ? formatPara(h.fiyat) : '<span style="opacity:0.3">—</span>'}</span>
      </div>`).join('')}
    </div>`;
  }

  function filterFirmalar() {
    const q = document.getElementById('aramaInput').value.toLowerCase();
    renderFirmalar(tumFirmalar.filter(f => f.ad.toLowerCase().includes(q)));
  }

  function openFirmaModal() {
    editFirmaId = null;
    document.getElementById('firmaModalBaslik').textContent = 'Firma Ekle';
    document.getElementById('firmaAd').value = '';
    document.getElementById('firmaNot').value = '';
    document.getElementById('firmaError').textContent = '';
    document.getElementById('firmaModal').classList.add('open');
  }

  function openEditFirma(id, ad, not) {
    editFirmaId = id;
    document.getElementById('firmaModalBaslik').textContent = 'Firma Düzenle';
    document.getElementById('firmaAd').value = ad;
    document.getElementById('firmaNot').value = not;
    document.getElementById('firmaError').textContent = '';
    document.getElementById('firmaModal').classList.add('open');
  }

  function closeFirmaModal() { document.getElementById('firmaModal').classList.remove('open'); }

  async function saveFirma() {
    const ad  = document.getElementById('firmaAd').value.trim();
    const not = document.getElementById('firmaNot').value.trim();
    const errEl = document.getElementById('firmaError');
    if (!ad) { errEl.textContent = 'Firma adı gerekli.'; return; }
    errEl.textContent = '';
    const url    = editFirmaId ? `/api/firmalar/${editFirmaId}` : '/api/firmalar';
    const method = editFirmaId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ad, not }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Hata oluştu.'; return; }
    closeFirmaModal();
    loadFirmalar();
    loadOzet();
  }

  function openDeleteModal(id) {
    deleteFirmaId = id;
    document.getElementById('deleteModal').classList.add('open');
  }

  function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('open');
    deleteFirmaId = null;
  }

  async function confirmDelete() {
    if (!deleteFirmaId) return;
    const res = await fetch(`/api/firmalar/${deleteFirmaId}`, { method: 'DELETE' });
    if (res.ok) {
      if (seciliFirmaId === deleteFirmaId) {
        seciliFirmaId = null;
        document.getElementById('onizlemeBos').style.display = 'flex';
        document.getElementById('onizlemeIcerik').style.display = 'none';
      }
      closeDeleteModal();
      loadFirmalar();
      loadOzet();
    }
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  }

  function formatPara(val) {
    if (val === null || val === undefined) return '—';
    const formatted = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val);
    return `<span class="currency">₺</span>${formatted}`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(s) {
    return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  }

  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });

  initTheme();
  checkAuth().then(() => { fetchKur().then(() => { loadOzet(); loadFirmalar(); }); });
</script>
</body>
</html>
