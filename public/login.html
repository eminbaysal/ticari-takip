<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — Ticari Takip</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f12;
    --surface: #161a20;
    --border: #2a2f38;
    --accent: #00d4aa;
    --accent-dim: rgba(0,212,170,0.12);
    --text: #e2e8f0;
    --text-muted: #64748b;
    --danger: #f87171;
  }
  html[data-theme="light"] {
    --bg: #f8fafc;
    --surface: #ffffff;
    --border: #e2e8f0;
    --accent: #0ea5e9;
    --accent-dim: rgba(14,165,233,0.12);
    --text: #0f172a;
    --text-muted: #475569;
    --danger: #ef4444;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 60% 40%, rgba(0,212,170,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image: linear-gradient(color-mix(in srgb, var(--border) 55%, transparent) 1px, transparent 1px),
                      linear-gradient(90deg, color-mix(in srgb, var(--border) 55%, transparent) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
  }
  .theme-toggle {
    position: absolute;
    top: 12px;
    right: 12px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 6px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    width: auto;
    margin-top: 0;
  }
  .theme-toggle:hover { color: var(--text); border-color: color-mix(in srgb, var(--border) 50%, var(--text-muted)); background: color-mix(in srgb, var(--accent-dim) 65%, transparent); }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .brand {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  h1 {
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 32px;
    color: var(--text);
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%;
    background: var(--accent);
    color: #0d0f12;
    border: none;
    padding: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--danger);
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <button class="theme-toggle" id="themeToggle" type="button">Tema</button>
  <div class="brand">Ticari Takip Sistemi</div>
  <h1>Giriş Yap</h1>
  <div class="error" id="errorMsg"></div>
  <label>Kullanıcı Adı</label>
  <input type="text" id="username" autocomplete="username" />
  <label>Şifre</label>
  <input type="password" id="password" autocomplete="current-password" />
  <button id="loginBtn" onclick="login()">Giriş Yap</button>
</div>
<script>
  function applyTheme(next) {
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('theme', next); } catch {}
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = next === 'light' ? 'Dark' : 'Light';
  }

  function initTheme() {
    let t = null;
    try { t = localStorage.getItem('theme'); } catch {}
    if (!t) {
      t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    applyTheme(t);
    const btn = document.getElementById('themeToggle');
    if (btn) {
      btn.addEventListener('click', () => {
        const cur = document.documentElement.dataset.theme || 'dark';
        applyTheme(cur === 'light' ? 'dark' : 'light');
      });
    }
  }

  initTheme();
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('errorMsg');
    errEl.classList.remove('show');
    if (!username || !password) {
      errEl.textContent = 'Kullanıcı adı ve şifre gerekli.';
      errEl.classList.add('show');
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Giriş yapılıyor...';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = '/';
      } else {
        errEl.textContent = data.error || 'Giriş başarısız.';
        errEl.classList.add('show');
      }
    } catch {
      errEl.textContent = 'Sunucuya ulaşılamadı.';
      errEl.classList.add('show');
    }
    btn.disabled = false;
    btn.textContent = 'Giriş Yap';
  }
</script>
</body>
</html>
