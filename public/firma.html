<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firma Detay — Ödeme Takip</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="grid-bg"></div>
<nav class="navbar">
  <div class="nav-brand">
    <span class="mono accent">ETS</span>
    <span>Ödeme Takip Sistemi</span>
  </div>
  <div class="nav-right">
    <button class="nav-icon-btn admin" id="adminBtn" onclick="window.location.href='/admin'" data-tip="Yönetici Paneli" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </button>
    <button class="nav-icon-btn" id="themeToggle" type="button" data-tip="Temayı Değiştir">
      <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="nav-icon-btn logout" onclick="logout()" data-tip="Çıkış Yap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</nav>

<div class="container">
  <div class="firma-detay-header" id="firmaDetayHeader">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="/" class="back-arrow-btn" title="Ana Sayfa">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <div id="firmaLogoEl"></div>
      <div>
        <h1 id="firmaBaslik">—</h1>
        <p class="firma-not-text" id="firmaNotText"></p>
      </div>
    </div>
    <div class="firma-detay-actions">
      <div class="toplam-badge" id="toplamBadge">Toplam: —</div>
      <button class="btn-ghost" onclick="openEditFirmaModal()">Düzenle</button>
    </div>
  </div>

  <div class="section-header">
    <h2>Hizmet Kayıtları</h2>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="kurBilgi" style="font-size:13px;color:var(--text-muted);"></span>
      <button class="btn-primary" onclick="openHizmetModal()">+ Hizmet Ekle</button>
    </div>
  </div>

  <div id="hizmetListesi"></div>
</div>

<!-- Hizmet Modal -->
<div class="modal-overlay" id="hizmetModal">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3 id="hizmetModalBaslik">Hizmet Ekle</h3>
      <button class="modal-close" onclick="closeHizmetModal()">✕</button>
    </div>
    <div class="modal-grid">
      <div>
        <label>Hizmet Tipi *</label>
        <select id="hizmetTip" class="modal-input modal-select" onchange="onTipChange()">
          <option value="danismanlik">Danışmanlık</option>
          <option value="teknik-destek">Teknik Destek</option>
          <option value="urun-tedariki">Ürün Tedariği</option>
          <option value="cihaz-kurulumu">Cihaz Kurulumu</option>
          <option value="devreye-alma">Devreye Alma</option>
          <option value="diger">Diğer</option>
        </select>
        <input type="text" id="hizmetTipOzel" class="modal-input" placeholder="Hizmet tipini yazın..." style="display:none;margin-top:6px;" />
      </div>
      <div>
        <label>Durum *</label>
        <select id="hizmetDurum" class="modal-input modal-select" onchange="onDurumChange()">
          <option value="bekliyor">Bekliyor</option>
          <option value="tamamlandi">Tamamlandı</option>
          <option value="fatura-kesildi">Fatura Kesildi</option>
          <option value="tahsil-edildi">Tahsil Edildi</option>
        </select>
        <div id="faturaTarihiWrap" style="display:none;margin-top:6px;">
          <label style="font-size:12px;margin-bottom:3px;display:block;">Fatura Tarihi</label>
          <input type="date" id="faturaTarihi" class="modal-input" />
        </div>
      </div>
      <div>
        <label>Tarih (opsiyonel)</label>
        <input type="date" id="hizmetTarih" class="modal-input" />
      </div>
      <div>
        <label>Fiyat (opsiyonel)</label>
        <div style="display:flex;gap:8px;">
          <select id="hizmetParaBirimi" class="modal-input modal-select" style="width:90px;flex-shrink:0;">
            <option value="TRY">₺ TL</option>
            <option value="USD">$ USD</option>
          </select>
          <input type="number" id="hizmetFiyat" class="modal-input" placeholder="0.00" step="0.01" min="0" style="flex:1;" />
        </div>
      </div>
    </div>
    <!-- Ürün Tedariği alanları -->
    <div id="urunSection" style="display:none;margin-top:2px;">
      <div class="modal-grid">
        <div>
          <label>Ürün Adı *</label>
          <input type="text" id="urunAdi" class="modal-input" placeholder="Ürün adını girin" />
        </div>
        <div>
          <label>Adet *</label>
          <input type="number" id="urunAdet" class="modal-input" placeholder="1" min="1" step="1" />
        </div>
      </div>
    </div>
    <label>Açıklama *</label>
    <textarea id="hizmetAciklama" class="modal-input modal-textarea"></textarea>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeHizmetModal()">İptal</button>
      <button class="btn-primary" onclick="saveHizmet()">Kaydet</button>
    </div>
    <div class="modal-error" id="hizmetError"></div>
  </div>
</div>

<!-- Firma Düzenleme Modal -->
<div class="modal-overlay" id="firmaEditModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Firma Düzenle</h3>
      <button class="modal-close" onclick="document.getElementById('firmaEditModal').classList.remove('open')">✕</button>
    </div>
    <label>Firma Adı *</label>
    <input type="text" id="editFirmaAd" class="modal-input" />
    <label>Web Sitesi (opsiyonel)</label>
    <input type="text" id="editFirmaWebsite" class="modal-input" placeholder="https://örnek.com" />
    <label>Not (opsiyonel)</label>
    <textarea id="editFirmaNot" class="modal-input modal-textarea"></textarea>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="document.getElementById('firmaEditModal').classList.remove('open')">İptal</button>
      <button class="btn-primary" onclick="saveEditFirma()">Kaydet</button>
    </div>
    <div class="modal-error" id="firmaEditError"></div>
  </div>
</div>

<div id="aciklamaTooltip"></div>

<!-- Hizmet Silme Onay -->
<div class="modal-overlay" id="hizmetDeleteModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Hizmeti Sil</h3>
      <button class="modal-close" onclick="closeHizmetDeleteModal()">✕</button>
    </div>
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:24px;">Bu hizmet kaydı silinecek. Emin misiniz?</p>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeHizmetDeleteModal()">İptal</button>
      <button class="btn-danger" onclick="confirmHizmetDelete()">Sil</button>
    </div>
  </div>
</div>

<script>
  const firmaId = window.location.pathname.split('/firma/')[1];
  let firmaData = null;

  const avatarRenkler = ['#4f8ef5','#22c55e','#f59e0b','#a78bfa','#f07070','#06b6d4','#ec4899','#84cc16'];
  function avatarRenk(ad) {
    let hash = 0;
    for (let i = 0; i < ad.length; i++) hash = ad.charCodeAt(i) + ((hash << 5) - hash);
    return avatarRenkler[Math.abs(hash) % avatarRenkler.length];
  }
  function renderFirmaLogo(f) {
    const harf = (f.ad || '?')[0].toUpperCase();
    const renk = avatarRenk(f.ad || '');
    const site = f.website || localStorage.getItem('fw_' + f._id) || '';
    if (site) {
      const domain = site.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
      return `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64"
        style="width:40px;height:40px;border-radius:9px;object-fit:contain;background:#fff;"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
        <div style="width:40px;height:40px;border-radius:9px;display:none;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;background:${renk};">${harf}</div>`;
    }
    return `<div style="width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;background:${renk};">${harf}</div>`;
  }
  let hizmetler = [];
  let editHizmetId = null;
  let deleteHizmetId = null;
  let kurUSD = null;

  async function fetchKur() {
    try {
      let saved = null;
      try { saved = parseFloat(localStorage.getItem('kurUSD')); } catch {}
      if (saved && saved > 1) { kurUSD = saved; }
      const res = await fetch('https://open.er-api.com/v6/latest/USD');
      const data = await res.json();
      if (data && data.rates && data.rates.TRY) {
        kurUSD = data.rates.TRY;
        try { localStorage.setItem('kurUSD', kurUSD); } catch {}
      }
    } catch {
      try {
        const saved = parseFloat(localStorage.getItem('kurUSD'));
        if (saved && saved > 1) kurUSD = saved;
      } catch {}
    }
    renderKurBilgi();
  }

  function renderKurBilgi() {
    const el = document.getElementById('kurBilgi');
    if (!el) return;
    el.innerHTML = kurUSD
      ? `1 USD = <strong>₺${new Intl.NumberFormat('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(kurUSD)}</strong> &nbsp;<button onclick="manuelKur()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:0;">✎ Düzenle</button>`
      : `<span style="color:var(--warn);">Kur alınamadı</span> &nbsp;<button onclick="manuelKur()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:0;">Manuel gir</button>`;
  }

  function manuelKur() {
    const val = prompt('Güncel USD/TRY kurunu girin:', kurUSD || '');
    if (!val) return;
    const parsed = parseFloat(val.replace(',', '.'));
    if (!parsed || parsed < 1) return;
    kurUSD = parsed;
    try { localStorage.setItem('kurUSD', kurUSD); } catch {}
    renderKurBilgi();
    renderHizmetler();
    updateToplam();
  }

  function applyTheme(next) {
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('theme', next); } catch {}
    const sun  = document.getElementById('iconSun');
    const moon = document.getElementById('iconMoon');
    if (sun && moon) {
      sun.style.display  = next === 'light' ? 'block' : 'none';
      moon.style.display = next === 'dark'  ? 'block' : 'none';
    }
  }

  function initTheme() {
    let t = null;
    try { t = localStorage.getItem('theme'); } catch {}
    if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    applyTheme(t);
    document.getElementById('themeToggle').addEventListener('click', () => {
      applyTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');
    });
  }

  const sabitTipler = ['danismanlik', 'urun-tedariki', 'cihaz-kurulumu', 'devreye-alma', 'diger'];
  const tipLabels = {
    'danismanlik': 'Danışmanlık',
    'teknik-destek': 'Teknik Destek',
    'urun-tedariki': 'Ürün Tedariği',
    'cihaz-kurulumu': 'Cihaz Kurulumu',
    'devreye-alma': 'Devreye Alma',
    'diger': 'Diğer'
  };

  function onDurumChange() {
    const durum = document.getElementById('hizmetDurum').value;
    const wrap = document.getElementById('faturaTarihiWrap');
    wrap.style.display = durum === 'fatura-kesildi' ? 'block' : 'none';
    if (durum !== 'fatura-kesildi') document.getElementById('faturaTarihi').value = '';
  }

  function onTipChange() {
    const tip = document.getElementById('hizmetTip').value;
    const ozel = document.getElementById('hizmetTipOzel');
    const urunSec = document.getElementById('urunSection');
    if (tip === 'diger') {
      ozel.style.display = 'block';
      ozel.focus();
    } else {
      ozel.style.display = 'none';
      ozel.value = '';
    }
    if (tip === 'urun-tedariki') {
      urunSec.style.display = 'block';
    } else {
      urunSec.style.display = 'none';
      document.getElementById('urunAdi').value = '';
      document.getElementById('urunAdet').value = '';
    }
  }
  const durumLabels = {
    'bekliyor': 'Bekliyor',
    'tamamlandi': 'Tamamlandı',
    'fatura-kesildi': 'Ödeme Bekleniyor',
    'tahsil-edildi': 'Ödeme Alındı ✓'
  };
  const durumClass = {
    'bekliyor': 'badge-warn',
    'tamamlandi': 'badge-info',
    'fatura-kesildi': 'badge-danger',
    'tahsil-edildi': 'badge-glowing'
  };

  async function checkAuth() {
    const res = await fetch('/api/auth/me');
    const data = await res.json();
    if (!data.loggedIn) { window.location.href = '/login'; return; }
    if (data.isAdmin) document.getElementById('adminBtn').style.display = 'flex';
  }

  async function loadDetay() {
    const res = await fetch(`/api/firmalar/${firmaId}/detay`);
    if (!res.ok) { window.location.href = '/'; return; }
    const d = await res.json();
    firmaData = d.firma;
    hizmetler = d.hizmetler;
    document.title = `${firmaData.ad} — Ödeme Takip`;
    document.getElementById('firmaLogoEl').innerHTML = renderFirmaLogo(firmaData);
    document.getElementById('firmaBaslik').textContent = firmaData.ad;
    document.getElementById('firmaNotText').textContent = firmaData.not || '';
    renderHizmetler();
    updateToplam();
  }

  function updateToplam() {
    let tryT = 0, usdT = 0;
    hizmetler.forEach(h => {
      if (!h.fiyat) return;
      if ((h.paraBirimi || 'TRY') === 'USD') usdT += h.fiyat;
      else tryT += h.fiyat;
    });
    let html = '';
    if (usdT > 0) {
      const usdFmt = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2 }).format(usdT);
      let kombine = '';
      if (kurUSD) {
        const komTL = tryT + usdT * kurUSD;
        kombine = ` &nbsp;|&nbsp; Kombine: ${formatPara(komTL)}`;
      }
      html = `TL: ${formatPara(tryT)} &nbsp;|&nbsp; <span class="currency" style="font-family:inherit;">$</span>${usdFmt} USD${kombine}`;
    } else {
      html = 'Toplam: ' + formatPara(tryT);
    }
    document.getElementById('toplamBadge').innerHTML = html;
  }

  function renderHizmetler() {
    const el = document.getElementById('hizmetListesi');
    if (!hizmetler.length) {
      el.innerHTML = '<div class="empty-state">Henüz hizmet kaydı yok.</div>';
      return;
    }
    el.innerHTML = `<div class="hizmet-liste">
      <div class="hizmet-liste-baslik">
        <span>Hizmet Tipi</span>
        <span>Durum</span>
        <span>Açıklama</span>
        <span>Tarih</span>
        <span>Fiyat</span>
        <span></span>
      </div>
      ${hizmetler.map(h => `
      <div class="hizmet-row">
        <span class="tip-badge">${escHtml(tipLabels[h.tip] || h.tip)}</span>
        <div style="display:flex;flex-direction:column;align-items:flex-start;gap:4px;">
          <span class="badge ${durumClass[h.durum] || 'badge-warn'}">${durumLabels[h.durum] || h.durum}</span>
          ${h.durum === 'fatura-kesildi' ? `<button class="tick-btn" title="Ödeme alındı olarak işaretle" onclick="markOdemeAlindi('${h._id}')" style="width:auto;border-radius:6px;padding:1px 8px;font-size:11px;height:18px;">✓ Ödeme Alındı</button>` : ''}
        </div>
        <div class="hizmet-aciklama" onmouseenter="showTooltip(event,this)" onmouseleave="hideTooltip()">
          ${h.tip === 'urun-tedariki' && h.urunAdi ? `<span style="font-weight:600;">${escHtml(h.urunAdi)}</span>${h.adet ? ` <span style="opacity:0.6;font-size:11px;">× ${h.adet}</span>` : ''}<br><span style="opacity:0.7;font-size:11px;">` : ''}${escHtml(h.aciklama)}${h.tip === 'urun-tedariki' && h.urunAdi ? '</span>' : ''}
        </div>
        <span class="hizmet-tarih">${h.tarih ? formatTarih(h.tarih) : ''}</span>
        <span class="hizmet-fiyat">${formatFiyat(h.fiyat, h.paraBirimi)}</span>
        <div class="hizmet-actions">
          <button class="btn-icon" onclick="openEditHizmet('${h._id}')">✎</button>
          <button class="btn-icon danger" onclick="openHizmetDeleteModal('${h._id}')">✕</button>
        </div>
      </div>
      `).join('')}
    </div>`;
  }

  function openHizmetModal() {
    editHizmetId = null;
    document.getElementById('hizmetModalBaslik').textContent = 'Hizmet Ekle';
    document.getElementById('hizmetTip').value = 'danismanlik';
    document.getElementById('hizmetTipOzel').value = '';
    document.getElementById('hizmetTipOzel').style.display = 'none';
    document.getElementById('urunSection').style.display = 'none';
    document.getElementById('urunAdi').value = '';
    document.getElementById('urunAdet').value = '';
    document.getElementById('faturaTarihiWrap').style.display = 'none';
    document.getElementById('faturaTarihi').value = '';
    document.getElementById('hizmetDurum').value = 'bekliyor';
    document.getElementById('hizmetTarih').value = '';
    document.getElementById('hizmetFiyat').value = '';
    document.getElementById('hizmetParaBirimi').value = 'TRY';
    document.getElementById('hizmetAciklama').value = '';
    document.getElementById('hizmetError').textContent = '';
    document.getElementById('hizmetModal').classList.add('open');
  }

  function openEditHizmet(id) {
    const h = hizmetler.find(x => x._id === id);
    if (!h) return;
    editHizmetId = id;
    document.getElementById('hizmetModalBaslik').textContent = 'Hizmet Düzenle';
    const ozelEl = document.getElementById('hizmetTipOzel');
    if (sabitTipler.includes(h.tip)) {
      document.getElementById('hizmetTip').value = h.tip;
      ozelEl.value = '';
      ozelEl.style.display = 'none';
    } else {
      document.getElementById('hizmetTip').value = 'diger';
      ozelEl.value = h.tip;
      ozelEl.style.display = 'block';
    }
    document.getElementById('hizmetDurum').value = h.durum;
    const ftwrap = document.getElementById('faturaTarihiWrap');
    if (h.durum === 'fatura-kesildi') {
      ftwrap.style.display = 'block';
      document.getElementById('faturaTarihi').value = h.faturaTarihi ? h.faturaTarihi.slice(0,10) : '';
    } else {
      ftwrap.style.display = 'none';
      document.getElementById('faturaTarihi').value = '';
    }
    document.getElementById('hizmetTarih').value = h.tarih ? h.tarih.slice(0,10) : '';
    document.getElementById('hizmetFiyat').value = h.fiyat !== null && h.fiyat !== undefined ? h.fiyat : '';
    document.getElementById('hizmetParaBirimi').value = h.paraBirimi || 'TRY';
    document.getElementById('hizmetAciklama').value = h.aciklama;
    document.getElementById('hizmetError').textContent = '';
    const urunSec = document.getElementById('urunSection');
    if (h.tip === 'urun-tedariki') {
      urunSec.style.display = 'block';
      document.getElementById('urunAdi').value = h.urunAdi || '';
      document.getElementById('urunAdet').value = h.adet !== null && h.adet !== undefined ? h.adet : '';
    } else {
      urunSec.style.display = 'none';
      document.getElementById('urunAdi').value = '';
      document.getElementById('urunAdet').value = '';
    }
    document.getElementById('hizmetModal').classList.add('open');
  }

  async function markOdemeAlindi(id) {
    const h = hizmetler.find(x => x._id === id);
    if (!h) return;
    const res = await fetch(`/api/hizmetler/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tip: h.tip, aciklama: h.aciklama || '', tarih: h.tarih,
        fiyat: h.fiyat, paraBirimi: h.paraBirimi, durum: 'tahsil-edildi',
        urunAdi: h.urunAdi, adet: h.adet
      })
    });
    if (res.ok) loadDetay();
  }

  function closeHizmetModal() {
    document.getElementById('hizmetModal').classList.remove('open');
  }

  async function saveHizmet() {
    const tipSec = document.getElementById('hizmetTip').value;
    const tipOzel = document.getElementById('hizmetTipOzel').value.trim();
    const tip = tipSec === 'diger' ? (tipOzel || 'diger') : tipSec;
    const durum = document.getElementById('hizmetDurum').value;
    const tarih = document.getElementById('hizmetTarih').value;
    const fiyat = document.getElementById('hizmetFiyat').value;
    const aciklama = document.getElementById('hizmetAciklama').value.trim();
    const errEl = document.getElementById('hizmetError');
    if (!aciklama && tipSec !== 'urun-tedariki') { errEl.textContent = 'Açıklama gerekli.'; return; }
    if (tipSec === 'diger' && !tipOzel) { errEl.textContent = 'Lütfen hizmet tipini yazın.'; return; }
    const urunAdi = document.getElementById('urunAdi').value.trim();
    const urunAdet = document.getElementById('urunAdet').value;
    if (tipSec === 'urun-tedariki' && !urunAdi) { errEl.textContent = 'Ürün adı gerekli.'; return; }
    errEl.textContent = '';
    const paraBirimi = document.getElementById('hizmetParaBirimi').value;
    const url = editHizmetId ? `/api/hizmetler/${editHizmetId}` : '/api/hizmetler';
    const method = editHizmetId ? 'PUT' : 'POST';
    const faturaTarihi = document.getElementById('faturaTarihi').value;
    const body = { tip, durum, tarih, fiyat, paraBirimi, aciklama, urunAdi, adet: urunAdet, faturaTarihi };
    if (!editHizmetId) body.firma = firmaId;
    const res = await fetch(url, {
      method, headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Hata oluştu.'; return; }
    closeHizmetModal();
    loadDetay();
  }

  function openEditFirmaModal() {
    if (!firmaData) return;
    document.getElementById('editFirmaAd').value = firmaData.ad;
    document.getElementById('editFirmaWebsite').value = firmaData.website || localStorage.getItem('fw_' + firmaId) || '';
    document.getElementById('editFirmaNot').value = firmaData.not || '';
    document.getElementById('firmaEditError').textContent = '';
    document.getElementById('firmaEditModal').classList.add('open');
  }

  async function saveEditFirma() {
    const ad = document.getElementById('editFirmaAd').value.trim();
    const website = document.getElementById('editFirmaWebsite').value.trim();
    const not = document.getElementById('editFirmaNot').value.trim();
    const errEl = document.getElementById('firmaEditError');
    if (!ad) { errEl.textContent = 'Firma adı gerekli.'; return; }
    const res = await fetch(`/api/firmalar/${firmaId}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ad, not, website })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Hata.'; return; }
    if (website) localStorage.setItem('fw_' + firmaId, website);
    else localStorage.removeItem('fw_' + firmaId);
    document.getElementById('firmaEditModal').classList.remove('open');
    loadDetay();
  }

  function openHizmetDeleteModal(id) {
    deleteHizmetId = id;
    document.getElementById('hizmetDeleteModal').classList.add('open');
  }

  function closeHizmetDeleteModal() {
    document.getElementById('hizmetDeleteModal').classList.remove('open');
    deleteHizmetId = null;
  }

  async function confirmHizmetDelete() {
    if (!deleteHizmetId) return;
    const res = await fetch(`/api/hizmetler/${deleteHizmetId}`, { method: 'DELETE' });
    if (res.ok) { closeHizmetDeleteModal(); loadDetay(); }
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  }

  function formatPara(val) {
    if (val === null || val === undefined) return '—';
    const formatted = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val);
    return `<span class="currency">₺</span>${formatted}`;
  }

  function formatFiyat(fiyat, paraBirimi) {
    if (fiyat === null || fiyat === undefined) return '<span style="opacity:0.3">—</span>';
    if ((paraBirimi || 'TRY') === 'USD') {
      const usdFmt = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(fiyat);
      let tlSatir = '';
      if (kurUSD) {
        const tl = fiyat * kurUSD;
        const tlFmt = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(tl);
        tlSatir = `<span style="display:block;font-size:11px;color:var(--text-muted);margin-top:2px;">₺${tlFmt}</span>`;
      }
      return `<span style="display:flex;flex-direction:column;align-items:flex-end;"><span><span class="currency" style="font-family:inherit;">$</span>${usdFmt}</span>${tlSatir}</span>`;
    }
    return formatPara(fiyat);
  }

  function formatTarih(t) {
    if (!t) return '';
    return new Date(t).toLocaleDateString('tr-TR');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const tooltip = document.getElementById('aciklamaTooltip');
  function showTooltip(e, el) {
    if (el.scrollWidth <= el.clientWidth) return;
    tooltip.textContent = el.textContent;
    tooltip.style.display = 'block';
    posTooltip(e);
    el.addEventListener('mousemove', posTooltip);
    el._moveHandler = posTooltip;
  }
  function posTooltip(e) {
    const margin = 12;
    let x = e.clientX + 14;
    let y = e.clientY + 14;
    if (x + 360 > window.innerWidth) x = e.clientX - 360 - margin;
    if (y + 120 > window.innerHeight) y = e.clientY - 120 - margin;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  }
  function hideTooltip() {
    tooltip.style.display = 'none';
    document.querySelectorAll('.hizmet-aciklama').forEach(el => {
      if (el._moveHandler) { el.removeEventListener('mousemove', el._moveHandler); delete el._moveHandler; }
    });
  }

  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });

  initTheme();
  checkAuth().then(() => { fetchKur().then(() => loadDetay()); });
</script>
</body>
</html>
